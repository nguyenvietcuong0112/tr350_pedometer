name: fitlife
description: "FitLife - Run & Calorie Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.1
  path: ^1.9.1
  pedometer: ^4.0.2
  geolocator: ^13.0.2
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  confetti: ^0.8.0
  google_maps_flutter: ^2.10.0
  responsive_size: ^0.0.7
  flutter_svg: ^2.0.10+1

  flutter_animate: ^4.5.2



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default:21
  remove_alpha_ios: true

